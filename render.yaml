services:
  # 1. PostgreSQL Database
  - type: db
    name: nivomoney-db
    plan: free
    ipAllowList: []

  # 2. Redis Cache
  - type: redis
    name: nivomoney-redis
    plan: free
    ipAllowList: []

  # 3. Unified Go Backend & API Gateway
  - type: web
    name: nivomoney-backend
    runtime: go
    plan: free
    buildCommand: go build -o gateway ./services/gateway
    startCommand: ./gateway
    envVars:
      - key: PORT
        value: "8000"
      - key: REDIS_URL
        fromRedis:
          name: nivomoney-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: nivomoney-db
          property: connectionString

  # 4. User React App (Static Frontend)
  - type: web
    name: nivomoney-user-app
    runtime: static
    plan: free
    buildCommand: cd frontend/user-app && npm install && npm run build
    publishPath: frontend/user-app/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        fromService:
          name: nivomoney-backend
          property: url

  # 5. Admin React App (Static Frontend)
  - type: web
    name: nivomoney-admin-app
    runtime: static
    plan: free
    buildCommand: cd frontend/admin-app && npm install && npm run build
    publishPath: frontend/admin-app/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        fromService:
          name: nivomoney-backend
          property: url
