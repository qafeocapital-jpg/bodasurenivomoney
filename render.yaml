databases:
  - name: nivomoney-db
    plan: basic-256mb

services:
  # 1. Redis Cache
  - type: redis
    name: nivomoney-redis
    plan: starter
    ipAllowList: []

  # 2. Unified Go Backend & API Gateway
  - type: web
    name: nivomoney-backend
    runtime: go
    plan: free
    buildCommand: go build -o gateway ./services/gateway
    startCommand: ./gateway
    envVars:
      - key: PORT
        value: "8000"
      - key: REDIS_URL
        fromService:
          type: redis
          name: nivomoney-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: nivomoney-db
          property: connectionString

  # 3. User React App (Static Frontend)
  - type: web
    name: nivomoney-user-app
    runtime: static
    buildCommand: cd frontend && npm install && npm run build:user
    staticPublishPath: frontend/user-app/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        value: https://nivomoney-backend.onrender.com

  # 4. Admin React App (Static Frontend)
  - type: web
    name: nivomoney-admin-app
    runtime: static
    buildCommand: cd frontend && npm install && npm run build:admin
    staticPublishPath: frontend/admin-app/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        value: https://nivomoney-backend.onrender.com
